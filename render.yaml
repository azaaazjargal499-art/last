services:
  - type: web
    name: smart-inventory-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smart-inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAILS
        sync: false
      - key: CORS_ORIGIN
        value: https://smart-inventory-web.onrender.com
      - key: FRONTEND_URL
        value: https://smart-inventory-web.onrender.com
      - key: BACKEND_URL
        value: https://smart-inventory-api-6xgn.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: web
    name: smart-inventory-web
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: https://smart-inventory-api-6xgn.onrender.com/api

databases:
  - name: smart-inventory-db
    plan: free
    databaseName: smart_inventory
    user: smart_inventory_user
