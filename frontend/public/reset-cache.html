<!doctype html>
<html lang="mn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset cache</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #07111f;
        color: #f8fafc;
        font-family: Arial, sans-serif;
      }
      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 24px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.82);
      }
      h1 { margin: 0 0 10px; font-size: 28px; }
      p { color: #cbd5e1; line-height: 1.6; }
      a { color: #34d399; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <h1>Cache цэвэрлэж байна...</h1>
      <p id="status">Service worker болон browser cache устгаж байна.</p>
      <p><a href="/">Буцах</a></p>
    </main>
    <script>
      (async function () {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          document.getElementById('status').textContent = 'Дууслаа. Одоо сайт руу буцааж байна...';
          setTimeout(() => location.replace('/'), 700);
        } catch (error) {
          document.getElementById('status').textContent = 'Cache reset хийх үед алдаа гарлаа. Browser refresh хийнэ үү.';
        }
      })();
    </script>
  </body>
</html>
